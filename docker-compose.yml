services:
  # שירות מסד הנתונים (חלק ג', סעיף 1)
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gamedb
    ports:
      - "5433:5432"

  # שירות האפליקציה שלך (חלק ג', סעיף 2)
  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/gamedb?schema=public"
    # שינוי הפקודה ל-db push כדי לעקוף שאלות אישור
    command: >
      sh -c "sleep 5 && npx prisma migrate dev --name init && node dist/main.js"